services:
  - type: web
    name: habit-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        # Set a fixed SECRET_KEY in Render Dashboard > Environment.
        # Generate: python -c "import secrets; print(secrets.token_urlsafe(64))"
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "43200"
      - key: ALLOWED_ORIGINS
        value: http://localhost:5173
      - key: DATABASE_URL
        # Set this in Render Dashboard > Environment to your Supabase connection string
        # Example: postgresql://postgres.xxxx:password@aws-0-region.pooler.supabase.com:6543/postgres
        sync: false
