services:
  - type: web
    name: habit-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: ALLOWED_ORIGINS
        value: http://localhost:5173
      - key: DATABASE_URL
        fromDatabase:
          name: habit-db
          property: connectionString

databases:
  - name: habit-db
    databaseName: habitdb
    plan: free
